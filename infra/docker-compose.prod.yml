name: lingo-chatul

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: api
      POSTGRES_DB: api_production
      POSTGRES_PASSWORD: ${API_DATABASE_PASSWORD:?required}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U api -d api_production"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    build:
      context: ../api
      dockerfile: Dockerfile
    image: lingo-chatul-api:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: "1"
      DB_HOST: db
      API_DATABASE_PASSWORD: ${API_DATABASE_PASSWORD:?required}
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY:?required}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      FAL_KEY: ${FAL_KEY}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_BUCKET: ${R2_BUCKET:-lang}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}
      SOLID_QUEUE_IN_PUMA: "true"
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost/up || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 30s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  pg_data:
  caddy_data:
  caddy_config:
