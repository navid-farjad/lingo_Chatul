# Kamal deploy config for lingo_Chatul API.
# Targets a single Hetzner box; Postgres runs as a sibling Kamal accessory on the same host.

service: lingo-chatul-api
image: navid-farjad/lingo-chatul-api

servers:
  web:
    - 49.12.247.57

ssh:
  user: root
  keys: [/root/.ssh/lingo_chatul]
  config: false

proxy:
  ssl: true
  host: api.lingochatul.com
  app_port: 80
  healthcheck:
    path: /up
    interval: 5

registry:
  server: ghcr.io
  username: navid-farjad
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: amd64
  remote: ssh://root@49.12.247.57

env:
  secret:
    - RAILS_MASTER_KEY
    - API_DATABASE_PASSWORD
    - ANTHROPIC_API_KEY
    - FAL_KEY
    - ELEVENLABS_API_KEY
    - R2_ACCESS_KEY_ID
    - R2_SECRET_ACCESS_KEY
  clear:
    SOLID_QUEUE_IN_PUMA: true
    DB_HOST: lingo-chatul-api-db
    R2_ENDPOINT: https://7d3108b03d75422190c487690eff151c.r2.cloudflarestorage.com
    R2_BUCKET: lang
    R2_PUBLIC_URL: https://pub-77b504a173c248358fc3f5e878d7bbf5.r2.dev
    RAILS_LOG_TO_STDOUT: "1"

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"
  migrate: app exec --interactive --reuse "bin/rails db:migrate"
  seed: app exec --interactive --reuse "bin/rails db:seed"

volumes:
  - "lingo_chatul_api_storage:/rails/storage"

accessories:
  db:
    image: postgres:16-alpine
    host: 49.12.247.57
    port: "127.0.0.1:5432:5432"
    env:
      clear:
        POSTGRES_USER: api
        POSTGRES_DB: api_production
      secret:
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql/data
